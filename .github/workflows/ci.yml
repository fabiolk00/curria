name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Secret Audit
        run: npm run audit:secrets

      - name: Copy Encoding Audit
        run: npm run audit:copy-encoding

      - name: PT-BR Copy Regression Audit
        run: npm run audit:copy-regression

      - name: TypeScript
        run: npm run typecheck

      - name: Architecture Proof Pack
        run: npm run test:architecture-proof-pack

      - name: Database Conventions
        run: npm run audit:db-conventions

      - name: Route Architecture Audit
        run: npm run audit:route-architecture

      - name: Lint
        run: npm run lint

      - name: Dead-Code Tooling Baseline
        run: |
          npm run unused -- --help
          npm run depcheck
          npm run orphans -- --help

      - name: Runtime Budget - Resume Builder
        run: npm run audit:runtime-budget
        env:
          ANTHROPIC_API_KEY: dummy
          OPENAI_API_KEY: sk-test-dummy
          NEXT_PUBLIC_SUPABASE_URL: http://localhost
          SUPABASE_SERVICE_ROLE_KEY: dummy
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          CLERK_SECRET_KEY: sk_test_dummy
          CLERK_WEBHOOK_SECRET: whsec_dummy
          ASAAS_ACCESS_TOKEN: dummy
          ASAAS_WEBHOOK_TOKEN: dummy
          UPSTASH_REDIS_REST_URL: https://dummy.upstash.io
          UPSTASH_REDIS_REST_TOKEN: dummy

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      E2E_AUTH_ENABLED: 'true'
      E2E_AUTH_BYPASS_SECRET: curria-e2e-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Browser E2E - Release Critical Stability
        run: npm run test:e2e:release-critical
