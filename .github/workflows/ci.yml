name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: TypeScript
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test
        env:
          ANTHROPIC_API_KEY: dummy
          NEXT_PUBLIC_SUPABASE_URL: http://localhost
          SUPABASE_SERVICE_ROLE_KEY: dummy
          ASAAS_API_KEY: dummy
          ASAAS_WEBHOOK_TOKEN: dummy
          UPSTASH_REDIS_URL: dummy
          UPSTASH_REDIS_TOKEN: dummy
